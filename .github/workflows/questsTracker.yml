name: Discord Quest Tracker

on:
  schedule:
    - cron: '0 */3 * * *'  # Chạy 3 tiếng / 1 lần
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  track-quests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (create lockfile if missing or fallback)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # If lockfile exists try npm ci first for reproducible installs.
          if [ -f package-lock.json ]; then
            echo "package-lock.json found — attempting npm ci"
            if npm ci --only=production; then
              echo "npm ci succeeded"
            else
              echo "npm ci failed — falling back to npm install --production"
              npm install --production
              # Commit regenerated lockfile if it changed
              git config user.name "Discord Quests Bot"
              git config user.email "bot@discordquests.dev"
              git add package-lock.json || true
              git diff --quiet -- package-lock.json || (git commit -m "chore: regenerate package-lock.json [skip ci]" package-lock.json && git push)
            fi
          else
            echo "No package-lock.json — running npm install --production and committing lockfile"
            npm install --production
            git config user.name "Discord Quests Bot"
            git config user.email "bot@discordquests.dev"
            git add package-lock.json || true
            git diff --quiet -- package-lock.json || (git commit -m "chore: add package-lock.json [skip ci]" package-lock.json && git push)
          fi

      - name: Run quest tracker
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          MAIN_WEBHOOK: ${{ secrets.MAIN_WEBHOOK }}
          ERROR_WEBHOOK: ${{ secrets.ERROR_WEBHOOK }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          LOCALE: ${{ vars.LOCALE || 'en-US' }}
          PING_ROLE_ID: ${{ vars.PING_ROLE_ID }}
        run: node src/main.js

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state.json

          if ! git diff --cached --quiet; then
            git commit -m "chore: update quest state [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No state changes."
          fi
